name: pull-request

on:
  pull_request:
    # Docs-only changes never touch a CI gate. The quality job runs
    # openapi:check + a views/seed determinism diff against
    # docs/framework/contracts/*.yaml and database/**, so those two paths are
    # deliberately NOT ignored here — everything else under docs/ is prose or
    # reference material that no script reads at build/test time.
    paths-ignore:
      - '**/*.md'
      - 'docs/_ia/**'
      - 'docs/framework/arch/**'
      - 'docs/framework/glossary/**'
      - 'docs/framework/product/**'
      - 'docs/integration/**'
      - 'docs/meta/**'
      - 'docs/reference/**'
      - 'docs/site/**'
      - 'docs/start/**'

# One run per ref at a time; a new push cancels the stale one in flight.
concurrency:
  group: pull-request-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: senatran
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/senatran
      # The integration/e2e setup overrides DATABASE_URL with
      # SENATRAN_TEST_DATABASE_URL ?? a passwordless local default; CI's Postgres
      # uses SCRAM auth, so the password must be supplied here.
      SENATRAN_TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/senatran
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: senatran
    steps:
      - uses: actions/checkout@v4
      # No `version:` here — pnpm/action-setup@v4 reads the pinned version from
      # package.json `packageManager`. Passing both trips ERR_PNPM_BAD_PM_VERSION
      # ("Multiple versions of pnpm specified").
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Static gates
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm openapi:check

      # Determinism: regenerated views + seeds must match what's committed
      - run: pnpm views:generate && pnpm seed:generate && git diff --exit-code database docs/framework/contracts/openapi.yaml

      # Database + tiered tests
      - run: pnpm db:reset
      - run: pnpm test:cov
      - run: pnpm test:integration
      - run: pnpm test:e2e
