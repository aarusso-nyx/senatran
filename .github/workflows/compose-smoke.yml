name: compose-smoke

# Builds the Docker image and brings the full stack up with docker compose,
# then smoke-tests the running mock end to end (deploy-shaped integration).
on:
  pull_request:
    # Kept in sync with pull-request.yml's paths-ignore — see that file for
    # why docs/framework/contracts/** is deliberately not excluded.
    paths-ignore:
      - '**/*.md'
      - 'docs/_ia/**'
      - 'docs/framework/arch/**'
      - 'docs/framework/glossary/**'
      - 'docs/framework/product/**'
      - 'docs/integration/**'
      - 'docs/meta/**'
      - 'docs/reference/**'
      - 'docs/site/**'
      - 'docs/start/**'
  push:
    # Post-merge smoke stays on push: it's the deploy-shaped check and the
    # repo has had at least one direct-to-main push outside the PR flow, so
    # this is the only gate guaranteed to catch that case.
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/_ia/**'
      - 'docs/framework/arch/**'
      - 'docs/framework/glossary/**'
      - 'docs/framework/product/**'
      - 'docs/integration/**'
      - 'docs/meta/**'
      - 'docs/reference/**'
      - 'docs/site/**'
      - 'docs/start/**'

# One run per ref at a time; a new push cancels the stale one in flight.
concurrency:
  group: compose-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build the app image (layer-cached via GitHub Actions cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: senatran-mock-app:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Bring the stack up (waits for health)
        # No --build: the app image was already built + loaded above with GHA
        # cache; docker-compose.yml pins the same tag so compose reuses it.
        run: docker compose up -d --wait

      - name: Smoke test the running mock
        run: |
          set -euo pipefail
          AUTH=(-H "x-cpf-usuario: 12345678909" -H "x-client-cert-cn: senatran-dev-client")

          echo "→ /health"
          curl -fsS http://localhost:3000/health | tee /dev/stderr | grep -q '"db":"up"'

          echo "→ seeded read (fixture ABC1D23)"
          curl -fsS "${AUTH[@]}" http://localhost:3000/v1/veiculos/placa/ABC1D23 \
            | tee /dev/stderr | grep -q 'ABC1D23'

          echo "→ magic-key forced 500 (ERR5A00)"
          code=$(curl -s -o /dev/null -w '%{http_code}' "${AUTH[@]}" \
            http://localhost:3000/v1/veiculos/placa/ERR5A00)
          test "$code" = "500"

          echo "→ missing auth header → 401"
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            http://localhost:3000/v1/veiculos/placa/ABC1D23)
          test "$code" = "401"

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
