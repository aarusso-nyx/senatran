components:
  securitySchemes:
    clientCertificate:
      type: mutualTLS
      description: >-
        Real-service authentication: client digital certificate (mTLS). Using the
        service requires prior registration of the certificate. Documented for
        fidelity; the mock does not perform a TLS handshake.
    clientCertSimulation:
      type: apiKey
      in: header
      name: x-client-cert-cn
      description: >-
        Mock stand-in for the real mTLS certificate. Send the allowlisted
        certificate Common Name in the `x-client-cert-cn` header. Enforced when
        `AUTH_CERT_SIMULATION=on` (default); ignored when off. Every request must
        also send `x-cpf-usuario`. See `docs/framework/contracts/auth.md`.

  parameters:
    XCpfUsuario:
      name: x-cpf-usuario
      in: header
      required: true
      description: CPF do usuário que está fazendo a requisição
      schema:
        type: string
    IdUltimoRegistro:
      name: idUltimoRegistro
      in: query
      required: false
      description: Consulta é feita a partir do registro com o id informado nesse campo
      schema:
        type: integer
        format: int64

  responses:
    BadRequest:
      description: Requisição inválida. A requisição não foi aceita, geralmente por falta de um parâmetro requerido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Não autorizado. Problemas durante a autenticação do certificado ou do CPF do usuário.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessError:
      description: Requisição falhou. Os parâmetros foram validados, mas houve algum erro de negócio.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Não encontrado. O recurso solicitado não existe.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Erro no servidor. Ocorreu algum erro interno.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        returnCode:
          type: integer
        message:
          type: string

    AlteracaoPermitida:
      type: object
      properties:
        mapeamentoAutomatico: { type: boolean }
        codigoTipoAlteracao: { type: string }
        codigoAlteracao: { type: string }
        descricaoAlteracao: { type: string }
        codigoSistema: { type: integer }

    AlteracaoPermitidaList:
      type: array
      items:
        $ref: '#/components/schemas/AlteracaoPermitida'

    CondutorOcorrencia:
      type: object
      properties:
        mapeamentoAutomatico: { type: boolean }
        ufDetranBloqueio: { type: string }
        dataImpedimentoBloqueio: { type: string, format: date-time }
        motivoImpedimentoBloqueio: { type: string }
        descricaoMotivoImpedimentoBloqueio: { type: string }
        orgaoResponsavelImpedimentoBloqueio: { type: integer }
