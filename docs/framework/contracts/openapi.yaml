openapi: 3.1.0
info:
  title: WSDenatran REST API (mock)
  version: 1.0.0
  license:
    name: UNLICENSED
    url: https://example.invalid/senatran/LICENSE
  description: >-
    Dev-only mock of the SERPRO WSDenatran REST API. This specification is the
    authoritative contract for the `senatran` repo. The service exposes
    read-only (GET) operations to query the Denatran (Brazilian national
    traffic department) database for drivers (condutores), vehicles (veiculos),
    infractions (infracoes) and related indicators.


    Every operation requires the `x-cpf-usuario` header identifying the user
    making the request. When a non-200 status is returned, the body follows the
    shared ErrorResponse schema (`returnCode`, `message`).


    Authentication: the real service uses a registered client certificate (mTLS,
    documented by the `clientCertificate` scheme). This mock **simulates** that
    with a header, `x-client-cert-cn` (the `clientCertSimulation` scheme), which
    is required when `AUTH_CERT_SIMULATION=on` (the default) and ignored when
    off. See `docs/framework/contracts/auth.md`. Not for production use.

servers:
  - url: /v1

security:
  - clientCertSimulation: []

tags:
  - name: autorizacoesAlteracaoVeiculo
    description: Consulta de autorizações de alteração de veículo
  - name: condutores
    description: Consulta de condutores
  - name: consultaCsv
    description: Consulta do Certificado de Segurança Veicular
  - name: indicadores
    description: Consulta de indicadores
  - name: infracoes
    description: Consulta de infrações
  - name: restricoesJudiciaisAtivas
    description: Consulta de restrições judiciais ativas
  - name: rouboFurto
    description: Consulta de roubo e furto
  - name: veiculos
    description: Consulta de veículos

paths:
  /autorizacoesAlteracaoVeiculo/alteracoesPermitidas:
    get:
      tags: [autorizacoesAlteracaoVeiculo]
      operationId: getAlteracoesPermitidas
      summary: Consulta alterações permitidas
      description: Consulta os tipos de alterações que são permitidas nos veículos.
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlteracaoPermitidaList'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BusinessError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /condutores/cpf/{cpf}:
