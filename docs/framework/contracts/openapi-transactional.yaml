openapi: 3.1.0
info:
  title: WSDenatran REST API (mock) — Transactional RENACH/RENAINF
  version: 1.0.0
  license:
    name: UNLICENSED
    url: https://example.invalid/senatran/LICENSE
  description: >-
    Dev-only mock. This specification is the transactional half of the same
    WSDenatran mock, ported from the canonical RENACH/RENAINF adapter API into
    the WSDenatran contract conventions (see
    `docs/framework/contracts/canonical-mapping.md`). It shares the exact same
    conventions as `openapi.yaml`: single `/v1` surface, `x-cpf-usuario` header,
    certificate simulation via `x-client-cert-cn`, raw JSON success bodies and
    the shared `ErrorResponse` (`returnCode`, `message`) error envelope.


    Unlike the read-only `openapi.yaml`, these operations are transactional:
    they create and mutate RENACH driver-licensing processes and RENAINF
    administrative-infraction cases, driving their respective state machines.
    Business-rule / state violations return 402 with the canonical error code
    carried in `message` as `CODE — descrição`. Not for production use.

servers:
  - url: /v1

security:
  - clientCertSimulation: []

tags:
  - name: renachProcessos
    description: RENACH — processos de habilitação (consulta, elegibilidade)
  - name: renachExames
    description: RENACH — exames médicos, avaliações psicológicas e retificações
  - name: renachAgendamentos
    description: RENACH — agendamentos de exame e check-in
  - name: renachClinicas
    description: RENACH — clínicas e profissionais credenciados
  - name: renachJunta
    description: RENACH — encaminhamentos e pareceres de junta médica
  - name: renainfTalonario
    description: RENAINF — talonário eletrônico (dispositivos, sincronização, faixas)
  - name: renainfAutosInfracao
    description: RENAINF — autos de infração de trânsito (AIT)
  - name: renainfProcessos
    description: RENAINF — processos administrativos e notificações
  - name: renainfRecursos
    description: RENAINF — defesas prévias, recursos e julgamentos
  - name: renainfPagamentos
    description: RENAINF — débitos e pagamentos

paths:
  # ---------------------------------------------------------------------------
  # RENACH
  # ---------------------------------------------------------------------------
  /renach/processos/{numeroRenach}:
    get:
      tags: [renachProcessos]
      operationId: getProcessoRenach
      summary: Consultar processo RENACH
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProcessoRenach' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BusinessError' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/elegibilidadeExame:
    post:
      tags: [renachProcessos]
      operationId: verificarElegibilidadeExame
      summary: Consultar elegibilidade para exame
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ElegibilidadeExameRequest' }
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/ElegibilidadeExameResponse' }
        '400':
          description: >-
            Requisição inválida. `RENACH.EXAM.INVALID_TYPE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.PROCESS.INVALID_STATUS`,
            `RENACH.PROCESS.BLOCKED`, `RENACH.PROCESS.EXPIRED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/clinicasCredenciadas:
    get:
      tags: [renachClinicas]
      operationId: listarClinicasCredenciadas
      summary: Listar clínicas credenciadas
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClinicaCredenciadaList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BusinessError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/profissionaisCredenciados:
    get:
      tags: [renachClinicas]
      operationId: listarProfissionaisCredenciados
      summary: Listar profissionais credenciados
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema:
                { $ref: '#/components/schemas/ProfissionalCredenciadoList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.EXAMINER.NOT_ACCREDITED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/agendamentos:
    post:
      tags: [renachAgendamentos]
      operationId: criarAgendamentoExame
      summary: Criar agendamento de exame
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgendamentoRequest' }
      responses:
        '201':
          description: Criado. Agendamento registrado com sucesso.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agendamento' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.PROCESS.INVALID_STATUS`,
            `RENACH.CLINIC.NOT_ACCREDITED`, `RENACH.CLINIC.INACTIVE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/agendamentos/{idAgendamento}:
    patch:
      tags: [renachAgendamentos]
      operationId: alterarAgendamento
      summary: Cancelar ou remarcar agendamento
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: idAgendamento
          in: path
          required: true
          description: Identificador do agendamento
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AgendamentoPatchRequest' }
      responses:
        '200':
          description: OK. Agendamento atualizado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agendamento' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.PROCESS.INVALID_STATUS`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/agendamentos/{idAgendamento}/checkin:
    post:
      tags: [renachAgendamentos]
      operationId: iniciarAtendimento
      summary: Iniciar atendimento
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: idAgendamento
          in: path
          required: true
          description: Identificador do agendamento
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckinRequest' }
      responses:
        '200':
          description: OK. Atendimento iniciado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Agendamento' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.PROCESS.INVALID_STATUS`,
            `RENACH.BIOMETRY.NOT_MATCHED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/examesMedicos:
    post:
      tags: [renachExames]
      operationId: registrarExameMedico
      summary: Registrar exame médico
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ExameMedicoRequest' }
      responses:
        '201':
          description: Criado. Exame médico registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exame' }
        '400':
          description: >-
            Requisição inválida. `RENACH.EXAM.INVALID_TYPE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.EXAM.ALREADY_RECORDED`,
            `RENACH.EXAM.RESULT_NOT_ALLOWED`, `RENACH.EXAM.REQUIRES_BOARD`,
            `RENACH.CLINIC.NOT_ACCREDITED`, `RENACH.EXAMINER.NOT_ACCREDITED`,
            `RENACH.EXAMINER.NOT_LINKED_TO_CLINIC`, `RENACH.SIGNATURE.INVALID`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/avaliacoesPsicologicas:
    post:
      tags: [renachExames]
      operationId: registrarAvaliacaoPsicologica
      summary: Registrar avaliação psicológica
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AvaliacaoPsicologicaRequest' }
      responses:
        '201':
          description: Criado. Avaliação psicológica registrada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exame' }
        '400':
          description: >-
            Requisição inválida. `RENACH.EXAM.INVALID_TYPE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.EXAM.ALREADY_RECORDED`,
            `RENACH.EXAM.RESULT_NOT_ALLOWED`, `RENACH.EXAMINER.NOT_ACCREDITED`,
            `RENACH.EXAMINER.NOT_LINKED_TO_CLINIC`, `RENACH.SIGNATURE.INVALID`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/exames:
    get:
      tags: [renachExames]
      operationId: consultarResultadosExames
      summary: Consultar resultados de exames
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ExameList' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BusinessError' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/exames/{idExame}/retificacoes:
    post:
      tags: [renachExames]
      operationId: retificarExame
      summary: Retificar exame
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: idExame
          in: path
          required: true
          description: Identificador do exame
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RetificacaoExameRequest' }
      responses:
        '202':
          description: Aceito. Retificação em processamento.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AceiteAssincrono' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.RECTIFICATION.NOT_ALLOWED`,
            `RENACH.EXAM.RESULT_NOT_ALLOWED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/encaminhamentosJunta:
    post:
      tags: [renachJunta]
      operationId: encaminharJuntaMedica
      summary: Encaminhar para junta médica
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EncaminhamentoJuntaRequest' }
      responses:
        '202':
          description: Aceito. Encaminhamento à junta em processamento.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AceiteAssincrono' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.EXAM.REQUIRES_BOARD`,
            `RENACH.PROCESS.INVALID_STATUS`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/pareceresJunta:
    post:
      tags: [renachJunta]
      operationId: registrarParecerJunta
      summary: Registrar parecer de junta
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParecerJuntaRequest' }
      responses:
        '201':
          description: Criado. Parecer de junta registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exame' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.PROCESS.INVALID_STATUS`,
            `RENACH.EXAM.RESULT_NOT_ALLOWED`, `RENACH.SIGNATURE.INVALID`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  # ---------------------------------------------------------------------------
  # RENAINF
  # ---------------------------------------------------------------------------
  /renainf/talonario/dispositivos:
    post:
      tags: [renainfTalonario]
      operationId: registrarDispositivoTalonario
      summary: Registrar dispositivo de talonário
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DispositivoTalonarioRequest' }
      responses:
        '201':
          description: Criado. Dispositivo de talonário registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DispositivoTalonario' }
        '400':
          description: >-
            Requisição inválida. `RENAINF.AIT.INVALID_DEVICE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENAINF.SNE.NOT_ADHERED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renainf/talonario/sincronizacao:
    get:
      tags: [renainfTalonario]
      operationId: sincronizarDominioOperacional
      summary: Sincronizar domínio operacional
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
      responses:
        '200':
          description: OK. Tudo funcionou como esperado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SincronizacaoTalonario' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { $ref: '#/components/responses/BusinessError' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renainf/talonario/faixasNumeracaoAit:
    post:
      tags: [renainfTalonario]
      operationId: reservarFaixaNumeracaoAit
      summary: Reservar numeração de AIT
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FaixaNumeracaoAitRequest' }
      responses:
        '201':
          description: Criado. Faixa de numeração de AIT reservada.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/FaixaNumeracaoAit' }
        '400':
          description: >-
            Requisição inválida. `RENAINF.AIT.INVALID_NUMBER`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENAINF.AIT.OUT_OF_RANGE`,
            `RENAINF.AIT.INVALID_DEVICE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renainf/autosInfracao:
    post:
      tags: [renainfAutosInfracao]
      operationId: criarAutoInfracao
      summary: Criar AIT
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AutoInfracaoRequest' }
      responses:
        '201':
          description: Criado. Auto de infração registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AutoInfracao' }
        '400':
          description: >-
            Requisição inválida. `RENAINF.AIT.INVALID_NUMBER`,
            `RENAINF.AIT.INVALID_INFRACTION_CODE`, `RENAINF.AIT.INVALID_AGENT`,
            `RENAINF.AIT.INVALID_DEVICE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENAINF.AIT.DUPLICATED`, `RENAINF.AIT.OUT_OF_RANGE`,
            `RENAINF.AIT.EVIDENCE_REQUIRED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
