        '402':
          description: >-
            Erro de negócio. `RENACH.EXAM.REQUIRES_BOARD`,
            `RENACH.PROCESS.INVALID_STATUS`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renach/processos/{numeroRenach}/pareceresJunta:
    post:
      tags: [renachJunta]
      operationId: registrarParecerJunta
      summary: Registrar parecer de junta
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
        - name: numeroRenach
          in: path
          required: true
          description: Número do processo RENACH
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ParecerJuntaRequest' }
      responses:
        '201':
          description: Criado. Parecer de junta registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Exame' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENACH.PROCESS.INVALID_STATUS`,
            `RENACH.EXAM.RESULT_NOT_ALLOWED`, `RENACH.SIGNATURE.INVALID`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: >-
            Não encontrado. `RENACH.PROCESS.NOT_FOUND`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '500': { $ref: '#/components/responses/ServerError' }

  # ---------------------------------------------------------------------------
  # RENAINF
  # ---------------------------------------------------------------------------
  /renainf/talonario/dispositivos:
    post:
      tags: [renainfTalonario]
      operationId: registrarDispositivoTalonario
      summary: Registrar dispositivo de talonário
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DispositivoTalonarioRequest' }
      responses:
        '201':
          description: Criado. Dispositivo de talonário registrado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DispositivoTalonario' }
        '400':
          description: >-
            Requisição inválida. `RENAINF.AIT.INVALID_DEVICE`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENAINF.SNE.NOT_ADHERED`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
