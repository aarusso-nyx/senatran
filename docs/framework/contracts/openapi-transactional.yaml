  # ---------------------------------------------------------------------------
  # RENAEST — base nacional de sinistros/acidentes de trânsito
  # National extension ported into WSDenatran conventions; see
  # national-extensions-mapping.md. Records are stateful (RECEBIDO → EM_ANALISE
  # → {CONSOLIDADO|REJEITADO}); writes are idempotent and audited.
  # ---------------------------------------------------------------------------
  /renaest/sinistros:
    post:
      tags: [renaestSinistros]
      operationId: submeterSinistroRenaest
      summary: Submeter registro de sinistro
      description: >-
        Registra um sinistro/acidente na base nacional RENAEST e retorna o
        `idSinistro` e o `protocolo`. Idempotente sob `Idempotency-Key`; um
        reenvio da mesma tupla (uf, codigoMunicipio, dataHoraSinistro,
        orgaoResponsavel) sem chave resulta em `RENAEST.CRASH.DUPLICATED`.
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SinistroRequest' }
      responses:
        '201':
          description: Criado. Sinistro recebido em situação RECEBIDO.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Sinistro' }
        '400':
          description: >-
            Requisição inválida. `RENAEST.CRASH.INVALID_LAYOUT` — versão de
            leiaute não suportada; ou corpo malformado.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402':
          description: >-
            Erro de negócio. `RENAEST.CRASH.DUPLICATED` (reenvio duplicado sem
            chave) ou `RENAEST.CRASH.INCOMPLETE_DATA` (dados de
            vítima/local/gravidade obrigatórios ausentes).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404': { $ref: '#/components/responses/NotFound' }
        '500': { $ref: '#/components/responses/ServerError' }

  /renaest/sinistros/lotes:
    post:
      tags: [renaestSinistros]
      operationId: submeterLoteSinistrosRenaest
      summary: Submeter lote de sinistros
      description: >-
        Registra um lote de sinistros em uma única transação e retorna o
        `protocoloLote` e os `itens` criados. Idempotente sob `Idempotency-Key`.
      parameters:
        - $ref: '#/components/parameters/XCpfUsuario'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SinistroLoteRequest' }
      responses:
        '201':
          description: Criado. Lote recebido.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SinistroLoteResponse' }
        '400':
          description: >-
            Requisição inválida. `RENAEST.CRASH.INVALID_LAYOUT` em algum item do
            lote, ou corpo malformado.
          content:
            application/json:
