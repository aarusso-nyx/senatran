components:
  securitySchemes:
    clientCertificate:
      type: mutualTLS
      description: >-
        Real-service authentication: client digital certificate (mTLS). Using the
        service requires prior registration of the certificate. Documented for
        fidelity; the mock does not perform a TLS handshake.
    clientCertSimulation:
      type: apiKey
      in: header
      name: x-client-cert-cn
      description: >-
        Mock stand-in for the real mTLS certificate. Send the allowlisted
        certificate Common Name in the `x-client-cert-cn` header. Enforced when
        `AUTH_CERT_SIMULATION=on` (default); ignored when off. Every request must
        also send `x-cpf-usuario`. See `docs/framework/contracts/auth.md`.

  parameters:
    XCpfUsuario:
      name: x-cpf-usuario
      in: header
      required: true
      description: CPF do usuário que está fazendo a requisição
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: >-
        Chave de idempotência opcional. Se enviada, é honrada para deduplicar
        escritas; caso contrário, a deduplicação usa chaves naturais
        (`numeroAit`, `numeroRenach`).
      schema:
        type: string

  responses:
    BadRequest:
      description: Requisição inválida. A requisição não foi aceita, geralmente por falta de um parâmetro requerido.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Não autorizado. Problemas durante a autenticação do certificado ou do CPF do usuário.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BusinessError:
      description: Requisição falhou. Os parâmetros foram validados, mas houve algum erro de negócio.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Não encontrado. O recurso solicitado não existe.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Erro no servidor. Ocorreu algum erro interno.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      properties:
        returnCode:
          type: integer
        message:
          type: string

    # -----------------------------------------------------------------------
    # Enums e tipos compartilhados
    # -----------------------------------------------------------------------
    TipoProcesso:
      type: string
      enum:
        - PRIMEIRA_HABILITACAO
        - RENOVACAO
        - MUDANCA_CATEGORIA
        - ADICAO_CATEGORIA
    ResultadoExame:
      type: string
      enum:
        - APTO
        - APTO_COM_RESTRICOES
        - INAPTO_TEMPORARIO
        - INAPTO
        - ENCAMINHADO_JUNTA
        - PENDENTE
    TipoRequerente:
      type: string
      enum:
        - PROPRIETARIO
        - CONDUTOR_IDENTIFICADO
        - REPRESENTANTE_LEGAL
    Instancia:
      type: string
      enum:
        - JARI
        - SEGUNDA_INSTANCIA
    SituacaoRenach:
      type: string
      description: Estado do processo RENACH na máquina de estados.
      enum:
        - ABERTO
        - AGUARDANDO_MEDICO
        - AGENDADO
        - EM_EXAME
        - EXAME_REGISTRADO
        - AGUARDANDO_PSICOLOGICO
        - EM_ANALISE
        - APROVADO
        - REJEITADO
    SituacaoRenainf:
      type: string
      description: Estado do processo administrativo RENAINF na máquina de estados.
      enum:
        - RASCUNHO
        - EMITIDO
        - ASSINADO
        - TRANSMITIDO
        - RECEBIDO
        - VALIDADO
        - REJEITADO
        - AUTUACAO_ABERTA
        - NOTIFICADO_AUTUACAO
        - AGUARDANDO_INDICACAO_CONDUTOR
        - AGUARDANDO_DEFESA_PREVIA
        - DEFESA_APRESENTADA
        - DEFESA_ACEITA
        - DEFESA_REJEITADA
        - PENALIDADE_IMPOSTA
        - NOTIFICADO_PENALIDADE
        - RECURSO_JARI_APRESENTADO
        - JARI_PROVIDO
        - JARI_NEGADO
        - SEGUNDA_INSTANCIA_APRESENTADA
        - DECISAO_FINAL
        - ARQUIVADO
    AssinaturaDigital:
      type: object
      description: Assinatura digital do ato.
      properties:
        certificado: { type: string }
        hash: { type: string }
        dataAssinatura: { type: string, format: date-time }
    Anexo:
      type: object
      properties:
        nome: { type: string }
        tipoConteudo: { type: string }
        hash: { type: string }
        urlArmazenamento: { type: string }
    Restricao:
      type: object
      properties:
        codigo: { type: string }
        descricao: { type: string }
    AceiteAssincrono:
      type: object
      description: Resposta de aceite assíncrono (202).
      required: [protocolo, situacao]
      properties:
        protocolo: { type: string }
        situacao:
          type: string
          description: Estado do recurso após o aceite (RENACH ou RENAINF).

    # -----------------------------------------------------------------------
    # RENACH — request schemas
    # -----------------------------------------------------------------------
    ElegibilidadeExameRequest:
      type: object
      description: Dados para verificação de elegibilidade ao exame.
      required: [tipoProcesso]
      properties:
        tipoProcesso: { $ref: '#/components/schemas/TipoProcesso' }
        categoriaAtual: { type: string }
        categoriaPretendida: { type: string }
    AgendamentoRequest:
      type: object
      required: [dataHora, codigoClinica, cpfCondutor]
      properties:
        idAgendamento: { type: string }
        dataHora: { type: string, format: date-time }
        codigoClinica: { type: string }
        cpfCondutor: { type: string }
    AgendamentoPatchRequest:
      type: object
      description: Cancelamento ou remarcação de agendamento.
      properties:
        dataHora: { type: string, format: date-time }
        codigoClinica: { type: string }
        cancelar: { type: boolean }
        motivo: { type: string }
    CheckinRequest:
      type: object
      required: [cpfCondutor]
      properties:
        cpfCondutor: { type: string }
        dataHora: { type: string, format: date-time }
        biometriaValidada: { type: boolean }
    ExameMedicoRequest:
      type: object
      description: Registro de exame médico (portado de MedicalExamRequest).
      required: [idAgendamento, clinica, examinador, condutor, processo, exame]
      properties:
        idAgendamento: { type: string }
        clinica:
          type: object
          required: [codigoClinica, cnpj]
          properties:
            codigoClinica: { type: string }
            cnpj: { type: string }
        examinador:
          type: object
          required: [cpf, conselho, numeroConselho, uf]
          properties:
            cpf: { type: string }
            conselho:
              type: string
              enum: [CRM]
            numeroConselho: { type: string }
            uf: { type: string }
        condutor:
          type: object
          required: [cpf, nome, dataNascimento]
          properties:
            cpf: { type: string }
            nome: { type: string }
            dataNascimento: { type: string, format: date }
        processo:
          type: object
          required: [numeroRenach, tipoProcesso]
          properties:
            numeroRenach: { type: string }
            tipoProcesso: { $ref: '#/components/schemas/TipoProcesso' }
            categoriaAtual: { type: string }
            categoriaPretendida: { type: string }
        exame:
          type: object
          required: [dataRealizacao, resultado]
          properties:
            dataRealizacao: { type: string, format: date-time }
            resultado: { $ref: '#/components/schemas/ResultadoExame' }
            dataValidade: { type: string, format: date }
            restricoes:
              type: array
              items: { $ref: '#/components/schemas/Restricao' }
            observacoes: { type: string }
        anexos:
          type: array
          items: { $ref: '#/components/schemas/Anexo' }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }
    AvaliacaoPsicologicaRequest:
      type: object
      description: Registro de avaliação psicológica (portado de PsychologicalEvaluationRequest).
      required: [idAgendamento, clinica, examinador, avaliacao]
      properties:
        idAgendamento: { type: string }
        clinica:
          type: object
          properties:
            codigoClinica: { type: string }
            cnpj: { type: string }
        examinador:
          type: object
          properties:
            cpf: { type: string }
            conselho:
              type: string
              enum: [CRP]
            numeroConselho: { type: string }
            uf: { type: string }
        avaliacao:
          type: object
          required: [dataRealizacao, resultado]
          properties:
            dataRealizacao: { type: string, format: date-time }
            resultado: { $ref: '#/components/schemas/ResultadoExame' }
            dataValidade: { type: string, format: date }
            bateriaTestes:
              type: array
              items: { type: string }
            observacoes: { type: string }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }
    RetificacaoExameRequest:
      type: object
      description: Solicitação de retificação de exame.
      required: [motivo]
      properties:
        motivo: { type: string }
        resultado: { $ref: '#/components/schemas/ResultadoExame' }
        observacoes: { type: string }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }
    EncaminhamentoJuntaRequest:
      type: object
      description: Encaminhamento do processo à junta médica.
      required: [motivo]
      properties:
        motivo: { type: string }
        idExame: { type: string }
        observacoes: { type: string }
    ParecerJuntaRequest:
      type: object
      description: Parecer da junta médica.
      required: [resultado]
      properties:
        resultado: { $ref: '#/components/schemas/ResultadoExame' }
        dataRealizacao: { type: string, format: date-time }
        dataValidade: { type: string, format: date }
        restricoes:
          type: array
          items: { $ref: '#/components/schemas/Restricao' }
        observacoes: { type: string }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }

    # -----------------------------------------------------------------------
    # RENACH — response schemas
    # -----------------------------------------------------------------------
    ProcessoRenach:
      type: object
      properties:
        protocolo: { type: string }
        numeroRenach: { type: string }
        situacao: { $ref: '#/components/schemas/SituacaoRenach' }
        tipoProcesso: { $ref: '#/components/schemas/TipoProcesso' }
        categoriaAtual: { type: string }
        categoriaPretendida: { type: string }
        condutor:
          type: object
          properties:
            cpf: { type: string }
            nome: { type: string }
            dataNascimento: { type: string, format: date }
      example:
        protocolo: RENACH-2026-000123
        numeroRenach: RS123456789
        situacao: AGUARDANDO_MEDICO
        tipoProcesso: RENOVACAO
        categoriaAtual: B
        categoriaPretendida: B
        condutor:
          cpf: '52998224725'
          nome: MARIA SILVA SANTOS
          dataNascimento: '1985-03-14'
    ElegibilidadeExameResponse:
      type: object
      properties:
        protocolo: { type: string }
        numeroRenach: { type: string }
        situacao: { $ref: '#/components/schemas/SituacaoRenach' }
        elegivel: { type: boolean }
        motivo: { type: string }
    Agendamento:
      type: object
      properties:
        protocolo: { type: string }
        idAgendamento: { type: string }
        numeroRenach: { type: string }
        situacao: { $ref: '#/components/schemas/SituacaoRenach' }
        dataHora: { type: string, format: date-time }
        codigoClinica: { type: string }
        cpfCondutor: { type: string }
    Exame:
      type: object
      properties:
        protocolo: { type: string }
        idExame: { type: string }
        numeroRenach: { type: string }
        situacao: { $ref: '#/components/schemas/SituacaoRenach' }
        resultado: { $ref: '#/components/schemas/ResultadoExame' }
        dataRealizacao: { type: string, format: date-time }
        dataValidade: { type: string, format: date }
        restricoes:
          type: array
          items: { $ref: '#/components/schemas/Restricao' }
      example:
        protocolo: RENACH-EXAME-2026-000045
        idExame: 6f1c2a80-0000-4000-8000-000000000045
        numeroRenach: RS123456789
        situacao: EXAME_REGISTRADO
        resultado: APTO
        dataRealizacao: '2026-07-10T09:30:00.000Z'
        dataValidade: '2031-07-10'
        restricoes: []
    ExameList:
      type: object
      properties:
        exames:
          type: array
          items: { $ref: '#/components/schemas/Exame' }
    ClinicaCredenciada:
      type: object
      properties:
        codigoClinica: { type: string }
        cnpj: { type: string }
        nome: { type: string }
        uf: { type: string }
        ativa: { type: boolean }
      example:
        codigoClinica: RS-CLINIC-0001
        cnpj: '46931757000108'
        nome: CLINICA RS-CLINIC-0001
        uf: PR
        ativa: true
    ClinicaCredenciadaList:
      type: object
      properties:
        clinicas:
          type: array
          items: { $ref: '#/components/schemas/ClinicaCredenciada' }
    ProfissionalCredenciado:
      type: object
      properties:
        cpf: { type: string }
        nome: { type: string }
        conselho:
          type: string
          enum: [CRM, CRP]
        numeroConselho: { type: string }
        uf: { type: string }
        ativo: { type: boolean }
      example:
        cpf: '89177194659'
        nome: CARLOS PEREIRA LIMA
        conselho: CRM
        numeroConselho: '52341'
        uf: PR
        ativo: true
    ProfissionalCredenciadoList:
      type: object
      properties:
        profissionais:
          type: array
          items: { $ref: '#/components/schemas/ProfissionalCredenciado' }

    # -----------------------------------------------------------------------
    # RENAINF — request schemas
    # -----------------------------------------------------------------------
    DispositivoTalonarioRequest:
      type: object
      required: [idDispositivo, codigoOrgaoAutuador]
      properties:
        idDispositivo: { type: string }
        codigoOrgaoAutuador: { type: string }
        descricao: { type: string }
        lavradoOffline: { type: boolean }
    FaixaNumeracaoAitRequest:
      type: object
      required: [codigoOrgaoAutuador, numeroInicial, numeroFinal]
      properties:
        codigoOrgaoAutuador: { type: string }
        idDispositivo: { type: string }
        numeroInicial: { type: string }
        numeroFinal: { type: string }
    AutoInfracaoRequest:
      type: object
      description: Criação de auto de infração (portado de InfractionNoticeRequest).
      required:
        [numeroAit, codigoOrgaoAutuador, agenteAutuador, infracao, veiculo]
      properties:
        numeroAit: { type: string }
        codigoOrgaoAutuador: { type: string }
        agenteAutuador:
          type: object
          required: [cpf, matricula]
          properties:
            cpf: { type: string }
            matricula: { type: string }
        dispositivo:
          type: object
          properties:
            idDispositivo: { type: string }
            lavradoOffline: { type: boolean }
        infracao:
          type: object
          required: [codigoInfracao, dataInfracao, codigoMunicipio, local]
          properties:
            codigoInfracao: { type: string }
            codigoDesdobramentoInfracao: { type: string }
            descricaoInfracao: { type: string }
            dataInfracao: { type: string, format: date-time }
            codigoMunicipio: { type: string }
            local:
              type: object
              properties:
                descricao: { type: string }
                latitude: { type: number }
                longitude: { type: number }
        veiculo:
          type: object
          required: [placa]
          properties:
            placa: { type: string }
            codigoRenavam: { type: string }
            uf: { type: string }
            descricaoMarcaModelo: { type: string }
        condutor:
          type: object
          properties:
            abordado: { type: boolean }
            cpf: { type: string }
            numeroRegistro: { type: string }
            uf: { type: string }
            recusouAssinar: { type: boolean }
        evidencias:
          type: array
          items:
            type: object
            properties:
              tipo: { type: string }
              hash: { type: string }
              tipoConteudo: { type: string }
              urlArmazenamento: { type: string }
        assinaturas:
          type: object
          properties:
            assinaturaAgente: { type: string }
            assinaturaCondutor: { type: string }
    LoteAutosInfracaoRequest:
      type: object
      description: Transmissão de lote de AITs lavrados offline.
      required: [autos]
      properties:
        idLote: { type: string }
        autos:
          type: array
          items: { $ref: '#/components/schemas/AutoInfracaoRequest' }
    SolicitacaoCancelamentoRequest:
      type: object
      required: [motivo]
      properties:
        motivo: { type: string }
        codigoOrgaoAutuador: { type: string }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }
    ProcessoAdministrativoRequest:
      type: object
      description: Abertura de autuação (processo administrativo) a partir de um AIT.
      required: [numeroAit]
      properties:
        numeroAit: { type: string }
        codigoOrgaoAutuador: { type: string }
    NotificacaoRequest:
      type: object
      required: [dataNotificacao]
      properties:
        dataNotificacao: { type: string, format: date-time }
        canal: { type: string }
        enderecoDestinatario: { type: string }
    IndicacaoCondutorRequest:
      type: object
      description: Indicação/identificação de condutor infrator.
      required: [requerente, condutorIndicado, dataProtocolo]
      properties:
        requerente:
          type: object
          required: [tipoRequerente, numeroDocumento]
          properties:
            tipoRequerente: { $ref: '#/components/schemas/TipoRequerente' }
            numeroDocumento: { type: string }
            nome: { type: string }
        condutorIndicado:
          type: object
          required: [cpf]
          properties:
            cpf: { type: string }
            nome: { type: string }
            numeroRegistro: { type: string }
            uf: { type: string }
        dataProtocolo: { type: string, format: date-time }
        canal: { type: string }
        anexos:
          type: array
          items: { $ref: '#/components/schemas/Anexo' }
    DefesaPreviaRequest:
      type: object
      description: Protocolo de defesa prévia (portado de PreliminaryDefenseRequest).
      required: [requerente, fundamentacao, dataProtocolo]
      properties:
        requerente:
          type: object
          required: [tipoRequerente, numeroDocumento]
          properties:
            tipoRequerente: { $ref: '#/components/schemas/TipoRequerente' }
            numeroDocumento: { type: string }
            nome: { type: string }
        fundamentacao: { type: string }
        anexos:
          type: array
          items: { $ref: '#/components/schemas/Anexo' }
        dataProtocolo: { type: string, format: date-time }
        canal: { type: string }
    PenalidadeRequest:
      type: object
      description: Imposição de penalidade.
      required: [valorMulta]
      properties:
        valorMulta: { type: number }
        pontos: { type: integer }
        dataImposicao: { type: string, format: date-time }
        fundamentacao: { type: string }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }
    RecursoRequest:
      type: object
      description: Protocolo de recurso JARI ou de segunda instância (portado de AppealRequest).
      required: [instancia, requerente, fundamentacao]
      properties:
        instancia: { $ref: '#/components/schemas/Instancia' }
        idRecursoAnterior: { type: string }
        requerente:
          type: object
          properties:
            tipoRequerente: { $ref: '#/components/schemas/TipoRequerente' }
            numeroDocumento: { type: string }
            nome: { type: string }
        fundamentacao: { type: string }
        anexos:
          type: array
          items: { $ref: '#/components/schemas/Anexo' }
        dataProtocolo: { type: string, format: date-time }
        canal: { type: string }
    JulgamentoRecursoRequest:
      type: object
      description: Registro do julgamento de um recurso.
      required: [resultado]
      properties:
        resultado:
          type: string
          enum: [PROVIDO, NEGADO]
        dataJulgamento: { type: string, format: date-time }
        fundamentacao: { type: string }
        assinaturaDigital: { $ref: '#/components/schemas/AssinaturaDigital' }
    PagamentoRequest:
      type: object
      required: [valorPago, dataPagamento, formaPagamento, numeroComprovante]
      properties:
        valorPago: { type: number }
        dataPagamento: { type: string, format: date-time }
        formaPagamento: { type: string }
        numeroComprovante: { type: string }

    # -----------------------------------------------------------------------
